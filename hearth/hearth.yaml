# Hearth authentication server — Homegrown Academy
# https://github.com/hearth-auth/hearth
#
# Embedded storage: no external PostgreSQL required.
# Dev mailcatcher UI: http://localhost:8420/dev/mail

server:
  host: 0.0.0.0
  port: 4433
  admin_port: 4434
  mailcatcher_port: 8420

storage:
  type: embedded
  path: /var/lib/hearth/db

# Built-in dev mailcatcher; no external SMTP needed in development.
email:
  type: dev

logging:
  level: info
  format: text

# Realm declared here so hearth reconciles it on every start.
# OAuth client (homegrown-spa) is also declared here; the admin bootstrap
# endpoint in make hearth-bootstrap creates/updates it on first run.
realms:
  homegrown:
    auth:
      token:
        access_token_ttl: "15m"
        refresh_token_ttl: "720h"

    applications:
      homegrown-spa:
        name: "Homegrown Academy SPA"
        redirect_uris:
          - "http://localhost:3500/v1/auth/callback"
          - "http://localhost:15180/v1/auth/callback"
        grant_types:
          - authorization_code
          - refresh_token
