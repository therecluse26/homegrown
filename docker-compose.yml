services:
  postgres:
    image: postgis/postgis:18-3.6
    environment:
      POSTGRES_USER: homegrown
      POSTGRES_PASSWORD: homegrown
      POSTGRES_DB: homegrown
    ports:
      - "5932:5432"
    volumes:
      - pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homegrown"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6879:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1525:1025"   # SMTP
      - "8525:8025"   # Web UI

  kratos:
    image: oryd/kratos:v1.3
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
    environment:
      DSN: postgres://homegrown:homegrown@postgres:5432/kratos?sslmode=disable
      SERVE_PUBLIC_BASE_URL: http://localhost:4933
      SERVE_ADMIN_BASE_URL: http://localhost:4934
    ports:
      - "4933:4433"   # Public API
      - "4934:4434"   # Admin API
    volumes:
      - ./kratos:/etc/kratos
    command: serve --config /etc/kratos/kratos.yml --dev --watch-courier
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:4434/health/alive"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  kratos_agent:
    image: oryd/kratos:v1.3
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
    environment:
      DSN: postgres://homegrown:homegrown@postgres:5432/kratos_agent?sslmode=disable
      LOG_LEVEL: warning
    command: serve --config /etc/kratos/kratos.yml --dev --watch-courier
    volumes:
      - ./kratos:/etc/kratos
    ports:
      - "4935:4433"   # Public API (agent)
      - "4936:4434"   # Admin API (agent)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:4434/health/alive"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  kratos-migrate:
    image: oryd/kratos:v1.3
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DSN: postgres://homegrown:homegrown@postgres:5432/kratos?sslmode=disable
    volumes:
      - ./kratos:/etc/kratos
    command: migrate sql -e --yes --config /etc/kratos/kratos.yml

  prometheus:
    image: prom/prometheus:v2.53.0
    depends_on:
      - alertmanager
      - blackbox
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"

  blackbox:
    image: prom/blackbox-exporter:v0.25.0
    ports:
      - "9115:9115"
    volumes:
      - ./monitoring/blackbox.yml:/etc/blackbox_exporter/config.yml:ro

  grafana:
    image: grafana/grafana:11.1.0
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: homegrown
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana

volumes:
  pg_data:
  prometheus_data:
  grafana_data:

