modules:
  # Probes an HTTP endpoint expecting a 2xx response within 5 seconds.
  http_2xx:
    prober: http
    timeout: 5s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: []   # empty = accept any 2xx
      method: GET
      follow_redirects: true
      preferred_ip_protocol: "ip4"
