host: localhost:3500
info:
  contact: {}
  description: API for the Homegrown Academy homeschooling platform
  title: Homegrown Academy API
  version: 0.1.0
paths:
  /account/deletion:
    delete:
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/shared.AppError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/shared.AppError'
      security:
      - BearerAuth: []
      summary: Cancel pending account deletion
      tags:
      - lifecycle
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/lifecycle.DeletionStatusResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/shared.AppError'
      security:
      - BearerAuth: []
      summary: Get account deletion status
      tags:
      - lifecycle
    post:
      consumes:
      - application/json
      parameters:
      - description: Deletion confirmation
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/lifecycle.RequestDeletionInput'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/shared.AppError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/shared.AppError'
      security:
      - BearerAuth: []
      summary: Request account deletion
      tags:
      - lifecycle
  /account/export:
    post:
      consumes:
      - application/json
      parameters:
      - description: Export options
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/lifecycle.RequestExportInput'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/shared.AppError'
      security:
      - BearerAuth: []
      summary: Request a data export
      tags:
      - lifecycle
  /account/export/{id}:
    get:
      parameters:
      - description: Export ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/lifecycle.ExportStatusResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/shared.AppError'
      security:
      - BearerAuth: []
      summary: Get export status
      tags:
      - lifecycle
  /account/exports:
    get:
      parameters:
      - description: Results per page
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/lifecycle.PaginatedExports'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.AppError'
      security:
      - BearerAuth: []
      summary: List data exports
      tags:
      - lifecycle
  /account/recovery:
    post:
      consumes:
      - application/json
      parameters:
      - description: Recovery details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/lifecycle.InitiateRecoveryInput'
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.AppError'
      summary: Initiate account recovery
      tags:
      - lifecycle
  /account/recovery/{id}:
    get:
      parameters:
      - description: Recovery ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/lifecycle.RecoveryStatusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/shared.AppError'
      summary: Get account recovery status
      tags:
      - lifecycle
  /account/sessions:
    delete:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.AppError'
      security:
      - BearerAuth: []
      summary: Revoke all other sessions
      tags:
      - lifecycle
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.AppError'
