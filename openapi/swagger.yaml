info:
  contact: {}
  description: API for the Homegrown Academy homeschooling platform
  title: Homegrown Academy API
  version: 0.1.0
paths:
  /auth/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/iam.CurrentUserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Get current user
      tags:
      - auth
  /compliance/config:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/comply.FamilyConfigResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.AppError'
        "402":
          description: Payment Required
          schema:
            $ref: '#/definitions/shared.AppError'
      security:
      - BearerAuth: []
      summary: Get family compliance configuration
      tags:
      - compliance
    put:
      consumes:
      - application/json
      parameters:
      - description: Family config
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/comply.UpsertFamilyConfigCommand'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/comply.FamilyConfigResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.AppError'
        "402":
          description: Payment Required
          schema:
            $ref: '#/definitions/shared.AppError'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/shared.AppError'
      security:
      - BearerAuth: []
      summary: Create or update family compliance configuration
      tags:
      - compliance
  /compliance/dashboard:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/comply.ComplianceDashboardResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.AppError'
        "402":
          description: Payment Required
          schema:
            $ref: '#/definitions/shared.AppError'
      security:
      - BearerAuth: []
      summary: Get compliance dashboard overview
      tags:
      - compliance
  /compliance/schedules:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/comply.ScheduleResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.AppError'
        "402":
          description: Payment Required
          schema:
