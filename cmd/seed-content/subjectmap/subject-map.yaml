# Subject tag mapping for content ingestion.
# Maps external source subject strings to learn_subject_taxonomy slugs.
# Each top-level key is a source namespace. All namespaces are merged at
# load time into a single lookup, so subject strings must be unique across
# sources (last writer wins on conflict — add source-specific prefixes if needed).
#
# Slugs must exist in learn_subject_taxonomy. Unknown slugs are inert at
# ingest time but will cause referential errors on DB insert.

openstax_subjects:
  # OpenStax catalog subject strings → learn_subject_taxonomy slugs.
  # These match the high-level subject labels returned by the OpenStax books API.
  "Math":                     ["math"]
  "Calculus":                 ["math", "math.calculus"]
  "Algebra":                  ["math", "math.algebra"]
  "Statistics":               ["math", "math.statistics"]
  "Prealgebra":               ["math", "math.arithmetic"]
  "Precalculus":              ["math", "math.calculus"]
  "Science":                  ["science"]
  "Biology":                  ["science", "science.biology"]
  "Chemistry":                ["science", "science.chemistry"]
  "Physics":                  ["science", "science.physics"]
  "Astronomy":                ["science", "science.astronomy"]
  "Anatomy & Physiology":     ["science", "science.biology"]
  "Microbiology":             ["science", "science.biology"]
  "Computer Science":         ["technology", "technology.cs"]
  "Social Sciences":          ["social-studies"]
  "Psychology":               ["social-studies"]
  "Sociology":                ["social-studies"]
  "Economics":                ["social-studies", "social-studies.economics"]
  "Government & Civics":      ["social-studies", "social-studies.civics"]
  "History":                  ["history"]
  "U.S. History":             ["history", "history.american"]
  "World History":            ["history", "history.world"]
  "Humanities":               ["language-arts", "history"]
  "English Composition":      ["language-arts", "language-arts.writing"]
  "Business":                 ["social-studies", "social-studies.economics", "life-skills"]
  "Business & Economics":     ["social-studies", "social-studies.economics"]
  "Accounting":               ["social-studies", "social-studies.economics", "life-skills"]

