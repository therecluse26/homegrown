name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options: [staging, production]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Build & push image ──────────────────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha-tag: sha-${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to staging ───────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')

    steps:
      - name: Pull image and restart on staging
        uses: appleboy/ssh-action@v1
        env:
          SHA_TAG: ${{ needs.build.outputs.sha-tag }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: SHA_TAG,IMAGE
          script: |
            set -e
            cd /opt/homegrown-academy
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull "${IMAGE}:${SHA_TAG}"
            IMAGE_TAG="${SHA_TAG}" docker compose -f docker-compose.prod.yml up -d --no-deps --wait app
            docker image prune -f --filter "until=24h"

      - name: Smoke test — staging /health
        run: |
          set -e
          for i in $(seq 1 18); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${{ secrets.STAGING_URL }}/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i/18: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 3 minutes"
          exit 1

  # ── Deploy to production (manual gate) ─────────────────────────────────────
  #
  # Configure the "production" GitHub Environment with required reviewers at:
  #   Settings → Environments → production → Deployment protection rules
  #
  deploy-production:
    name: Deploy → Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')

    steps:
      - name: Pull image and restart on production
        uses: appleboy/ssh-action@v1
        env:
          SHA_TAG: ${{ needs.build.outputs.sha-tag }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        with:
          host: ${{ secrets.PRODUCTION_SSH_HOST }}
          username: ${{ secrets.PRODUCTION_SSH_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          envs: SHA_TAG,IMAGE
          script: |
            set -e
            cd /opt/homegrown-academy
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull "${IMAGE}:${SHA_TAG}"
            IMAGE_TAG="${SHA_TAG}" docker compose -f docker-compose.prod.yml up -d --no-deps --wait app
            docker image prune -f --filter "until=24h"

      - name: Smoke test — production /health
        run: |
          set -e
          for i in $(seq 1 18); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${{ secrets.PRODUCTION_URL }}/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i/18: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 3 minutes"
          exit 1
